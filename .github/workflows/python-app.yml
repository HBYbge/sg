name: Build Mac Executable

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build Mac executable
        run: |
          pyinstaller -w -F SGmac.py

      - name: Fix permissions and zip
        run: |
          chmod +x dist/SGmac
          zip -j SGmac-Mac.zip dist/SGmac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SGmac-Mac
          path: SGmac-Mac.zip
